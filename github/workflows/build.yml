name: Build VoIP Matrix iOS

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup GitLab Access
        run: |
          git config --global url."https://oauth2:${{ secrets.GITLAB_TOKEN }}@gitlab.linphone.org".insteadOf "https://gitlab.linphone.org"

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Import Certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Import Provisioning Profiles
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
          NOTIFICATION_PROFILE_BASE64: ${{ secrets.NOTIFICATION_PROFILE_BASE64 }}
          EXTENSION_PROFILE_BASE64: ${{ secrets.EXTENSION_PROFILE_BASE64 }}
          INTENTS_PROFILE_BASE64: ${{ secrets.INTENTS_PROFILE_BASE64 }}
        run: |
          PP_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PP_DIR"
          echo -n "$PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PP_DIR/VM_Main.mobileprovision"
          echo -n "$NOTIFICATION_PROFILE_BASE64" | base64 --decode > "$PP_DIR/VM_Notification.mobileprovision"
          echo -n "$EXTENSION_PROFILE_BASE64" | base64 --decode > "$PP_DIR/VM_Extension.mobileprovision"
          echo -n "$INTENTS_PROFILE_BASE64" | base64 --decode > "$PP_DIR/VM_Intents.mobileprovision"

      - name: Resolve Packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -workspace LinphoneApp.xcodeproj/project.xcworkspace \
            -scheme Linphone

      - name: Build & Archive
        run: |
          xcodebuild archive \
            -workspace LinphoneApp.xcodeproj/project.xcworkspace \
            -scheme Linphone \
            -configuration Release \
            -archivePath $RUNNER_TEMP/VoIPMatrix.xcarchive \
            -destination generic/platform=iOS \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM=QKR284CT7A \
            PROVISIONING_PROFILE_SPECIFIER=VM_Main \
            CODE_SIGNING_ALLOWED=NO

      - name: Export IPA
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>QKR284CT7A</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.voipmatrix.ios</key>
              <string>VM_Main</string>
              <key>com.voipmatrix.ios.msgNotificationService</key>
              <string>VM_Notification</string>
              <key>com.voipmatrix.ios.linphoneExtension</key>
              <string>VM_Extension</string>
              <key>com.voipmatrix.ios.intentsExtension</key>
              <string>VM_Intents</string>
            </dict>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/VoIPMatrix.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/ipa

      - name: Upload to TestFlight
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_$APP_STORE_CONNECT_API_KEY_ID.p8
          xcrun altool --upload-app \
            --type ios \
            --file $(ls $RUNNER_TEMP/ipa/*.ipa) \
            --apiKey $APP_STORE_CONNECT_API_KEY_ID \
            --apiIssuer $APP_STORE_CONNECT_ISSUER_ID

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VoIPMatrix-signed-ipa
          path: ${{ runner.temp }}/ipa/*.ipa
          retention-days: 7
